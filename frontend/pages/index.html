<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/static/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>InterviewAI — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

  <!-- Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Main Wrapper -->
  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <div class="brand-dot"></div>
        </div>
        <span class="brand-name-light">Interview</span><span class="brand-name-bold">AI</span>
      </div>
      <p class="brand-tagline">AI · Mock · Interviews</p>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-scan"></div>
      <div class="card-top-line"></div>

      <div class="card-body">

        <!-- Header -->
        <div class="card-divider">
          <div class="card-divider-line"></div>
          <span class="card-divider-text">SECURE LOGIN</span>
          <div class="card-divider-line-r"></div>
        </div>
        <h2 class="card-title">Welcome back</h2>
        <p class="card-sub">Sign in to continue your interview prep</p>

        <!-- Error -->
        <div class="error-box" id="error-msg"></div>

        <!-- Email -->
        <div class="field">
          <label class="field-label">
            <span class="field-label-icon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
              EMAIL ADDRESS
            </span>
          </label>
          <input class="field-input" id="email" type="email" placeholder="you@example.com" autocomplete="email"/>
        </div>

        <!-- Password -->
        <div class="field">
          <label class="field-label">
            <span class="field-label-icon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              PASSWORD
            </span>
            <a href="/forgot-password">Forgot password?</a>
          </label>
          <div class="pw-wrap">
            <input class="field-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
            <button class="eye-btn" onclick="toggleEye('password','eye-icon')">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button class="btn" id="login-btn" onclick="handleLogin()">
          <span class="btn-spinner" id="login-spinner"></span>
          <span id="login-btn-text">SIGN IN →</span>
        </button>

        <div class="divider"><span>or</span></div>

        <p class="footer-link">No account? <a href="/register">Create one free →</a></p>

        <!-- Status -->
        <div class="status-bar">
          <div class="status-item">
            <div class="status-dot-green"></div>
            <span class="status-label">AI ONLINE</span>
          </div>
          <div class="status-sep"></div>
          <div class="status-item">
            <div class="status-dot-purple"></div>
            <span class="status-label">ENCRYPTED</span>
          </div>
          <div class="status-sep"></div>
          <div class="status-item">
            <div class="status-dot-cyan"></div>
            <span class="status-label">SECURE</span>
          </div>
        </div>

      </div>
      <div class="card-bottom-line"></div>
    </div>

  </div>

  <script src="/static/js/script.js"></script>
</body>
</html>
