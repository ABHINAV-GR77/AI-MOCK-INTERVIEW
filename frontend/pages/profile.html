<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/static/favicon.png"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InterviewAI — Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{accent:'#00e5ff',accent2:'#7b61ff',accent3:'#ff4d6d',success:'#00e676',warn:'#ffa726',surface:'#0d1117',bg:'#060a0f',border:'#1f2937',muted:'#6b7280'},fontFamily:{grotesk:['Space Grotesk','sans-serif'],mono:['DM Mono','monospace']}}}}</script>
  <style>
    @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
    @keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.5)}70%{box-shadow:0 0 0 6px rgba(0,230,118,0)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    .shimmer-brand{background:linear-gradient(90deg,#fff 0%,#00e5ff 30%,#7b61ff 60%,#fff 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}
    .pulse-dot{width:7px;height:7px;background:#00e676;border-radius:50%;flex-shrink:0;animation:pulseDot 2s infinite}
    .sidebar{width:64px;transition:width 0.3s cubic-bezier(0.4,0,0.2,1);overflow:hidden}
    .sidebar:hover{width:240px;box-shadow:4px 0 40px rgba(0,0,0,0.6)}
    .sidebar-inner{min-width:240px}
    .nav-txt,.sb-label,.sb-brand-txt,.sb-status-txt{opacity:0;transition:opacity 0.15s;white-space:nowrap}
    .sidebar:hover .nav-txt,.sidebar:hover .sb-label,.sidebar:hover .sb-brand-txt,.sidebar:hover .sb-status-txt{opacity:1;transition:opacity 0.2s ease 0.1s}
    .fade-up{animation:fadeUp 0.4s ease both}
    aside a, aside .nav-txt { font-family:'Space Grotesk',sans-serif !important; font-weight:500; }
  </style>
</head>
<body class="bg-bg text-white font-mono min-h-screen" style="background-image:linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);background-size:48px 48px;">
  <aside class="sidebar fixed left-0 top-0 bottom-0 bg-surface border-r border-border flex flex-col z-50">
    <div class="sidebar-inner flex flex-col h-full">
      <div class="flex items-center gap-3 px-4 py-5 border-b border-border flex-shrink-0">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style="background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2.2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
        <span class="shimmer-brand sb-brand-txt font-grotesk font-black text-base">InterviewAI</span>
      </div>
      <nav class="flex-1 p-3 overflow-y-auto overflow-x-hidden">
        <div class="sb-label text-xs tracking-widest uppercase px-2 mb-1 mt-1 font-bold" style="color:#4b5563">Main</div>
        <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 font-grotesk text-sm mb-0.5 no-underline transition-all"><svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-txt">Dashboard</span></a>
        <a href="/practice" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 font-grotesk text-sm mb-0.5 no-underline transition-all"><svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg><span class="nav-txt">Practice</span></a>
        <a href="/interview/voice" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 font-grotesk text-sm mb-0.5 no-underline transition-all"><svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg><span class="nav-txt">Voice Interview</span></a>
        <a href="/analytics" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 font-grotesk text-sm mb-0.5 no-underline transition-all"><svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span class="nav-txt">Analytics</span></a>
        <a href="/study-guide" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 font-grotesk text-sm mb-0.5 no-underline transition-all"><svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2 L13.5 8.5 L20 10 L13.5 11.5 L12 18 L10.5 11.5 L4 10 L10.5 8.5 Z" fill="currentColor" opacity="0.9"/><path d="M19 2 L19.8 4.2 L22 5 L19.8 5.8 L19 8 L18.2 5.8 L16 5 L18.2 4.2 Z" fill="currentColor" opacity="0.7"/><path d="M5 16 L5.6 17.4 L7 18 L5.6 18.6 L5 20 L4.4 18.6 L3 18 L4.4 17.4 Z" fill="currentColor" opacity="0.5"/></svg><span class="nav-txt">AI Chat</span></a>
        <div class="sb-label text-xs tracking-widest uppercase px-2 mb-1 mt-4 font-bold" style="color:#4b5563">Resources</div>
        <a href="/tips" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 font-grotesk text-sm mb-0.5 no-underline transition-all"><svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span class="nav-txt">Tips & Tricks</span></a>
        <a href="/leaderboard" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 font-grotesk text-sm mb-0.5 no-underline transition-all"><svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8m-4-4v4M5 3H3v5a4 4 0 0 0 4 4h0m12-9h2v5a4 4 0 0 1-4 4h0M7 3h10l-1 9H8L7 3z"/></svg><span class="nav-txt">Leaderboard</span></a>
        </nav>
      <div class="px-3 py-2 flex-shrink-0"><div class="flex items-center gap-2 bg-success/10 border border-success/20 rounded-xl px-3 py-2"><div class="pulse-dot"></div><span class="sb-status-txt text-success text-xs">AI Online</span></div></div>
      <div class="p-3 border-t border-border flex-shrink-0"></div>
    </div>
  </aside>

  <main class="ml-16 min-h-screen p-8">
    <div class="max-w-3xl mx-auto">
      <div class="mb-8 fade-up">
        <h1 class="font-grotesk font-black text-2xl text-white mb-1">My Profile</h1>
        <p class="text-muted text-sm">Your account info and interview history</p>
      </div>
      <div class="bg-surface border border-border rounded-2xl p-6 mb-5 fade-up" style="border-top:2px solid #00e5ff;">
        <div class="flex items-center gap-5 mb-6">
          <div class="w-16 h-16 rounded-2xl flex items-center justify-center font-grotesk font-black text-2xl text-white flex-shrink-0" id="profile-avatar" style="background:linear-gradient(135deg,#00e5ff,#7b61ff)">?</div>
          <div>
            <div class="font-grotesk font-bold text-lg text-white" id="profile-name">—</div>
            <div class="text-muted text-sm" id="profile-email">—</div>
            <div class="mt-1"><span class="text-xs px-2 py-0.5 rounded-full font-bold" style="background:rgba(0,229,255,0.1);color:#00e5ff;border:1px solid rgba(0,229,255,0.2)">Interview Candidate</span></div>
          </div>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div class="rounded-xl p-4 text-center" style="background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.1)">
            <div class="font-grotesk font-black text-2xl text-accent" id="p-total">—</div>
            <div class="text-xs text-muted mt-1">Total Sessions</div>
          </div>
          <div class="rounded-xl p-4 text-center" style="background:rgba(123,97,255,0.05);border:1px solid rgba(123,97,255,0.1)">
            <div class="font-grotesk font-black text-2xl text-accent2" id="p-avg">—</div>
            <div class="text-xs text-muted mt-1">Avg Score</div>
          </div>
          <div class="rounded-xl p-4 text-center" style="background:rgba(0,230,118,0.05);border:1px solid rgba(0,230,118,0.1)">
            <div class="font-grotesk font-black text-2xl text-success" id="p-streak">—</div>
            <div class="text-xs text-muted mt-1">Day Streak</div>
          </div>
        </div>
      </div>
      <div class="bg-surface border border-border rounded-2xl p-6 fade-up" style="border-top:2px solid #7b61ff;animation-delay:0.1s">
        <h2 class="font-grotesk font-bold text-base text-white mb-4">Recent Sessions</h2>
        <div id="p-sessions"><div class="text-muted text-sm text-center py-8">Loading...</div></div>
      </div>
    </div>
  </main>
  <script src="/static/js/script.js"></script>
  <script>
    async function loadProfile() {
      try {
        const res = await fetch('/dashboard/stats', { credentials: 'include' });
        if (!res.ok) { window.location.href = '/'; return; }
        const d = await res.json();
        const email = d.email || '';
        const name = email.split('@')[0];
        document.getElementById('profile-avatar').textContent = name[0].toUpperCase();
        document.getElementById('profile-name').textContent = name;
        document.getElementById('profile-email').textContent = email;
        document.getElementById('p-total').textContent = d.total_sessions || 0;
        document.getElementById('p-avg').textContent = d.avg_score ? d.avg_score + '%' : '—';
        document.getElementById('p-streak').textContent = (d.streak || 0) + 'd';
        const sessions = d.recent_sessions || [];
        const container = document.getElementById('p-sessions');
        if (!sessions.length) { container.innerHTML = '<div class="text-muted text-sm text-center py-8">No sessions yet. <a href="/practice" class="text-accent no-underline">Start practicing!</a></div>'; return; }
        const colors = { technical:'#ffa726', behavioral:'#00e676', system_design:'#7b61ff', product_sense:'#00e5ff' };
        container.innerHTML = sessions.map(s => {
          const t = (s.interview_type||'').replace('voice_','');
          const c = colors[t] || '#6b7280';
          const date = s.date ? new Date(s.date).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
          return `<div class="flex items-center justify-between rounded-xl px-4 py-3 mb-2" style="background:rgba(255,255,255,0.03);border:1px solid #1f2937">
            <div class="flex items-center gap-3"><div class="w-2 h-2 rounded-full flex-shrink-0" style="background:${c}"></div>
            <div><div class="text-sm font-grotesk font-bold text-white capitalize">${t.replace('_',' ')}</div><div class="text-xs text-muted">${date}</div></div></div>
            <div class="font-grotesk font-black text-sm" style="color:${c}">${s.score != null ? s.score+'%' : 'N/A'}</div></div>`;
        }).join('');
      } catch(e) { console.error(e); }
    }
    loadProfile();
  </script>
</body>
</html>
