<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/static/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>InterviewAI — Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <div class="brand-dot"></div>
        </div>
        <span class="brand-name-light">Interview</span><span class="brand-name-bold">AI</span>
      </div>
      <p class="brand-tagline">AI · Mock · Interviews</p>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-scan"></div>
      <div class="card-top-line"></div>

      <div class="card-body">

        <div class="card-divider">
          <div class="card-divider-line"></div>
          <span class="card-divider-text">ACCOUNT RECOVERY</span>
          <div class="card-divider-line-r"></div>
        </div>
        <h2 class="card-title">Forgot password?</h2>
        <p class="card-sub">Enter your email and we'll send a 6-digit OTP</p>

        <div class="error-box" id="error-msg"></div>
        <div class="success-box" id="success-msg">✓ OTP sent! Check your inbox. Redirecting...</div>

        <!-- Email -->
        <div class="field">
          <label class="field-label">
            <span class="field-label-icon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
              EMAIL ADDRESS
            </span>
          </label>
          <input class="field-input" id="email" type="email" placeholder="you@example.com"
            oninput="validateEmail(this,'email-hint')" autocomplete="email"/>
          <div class="email-hint" id="email-hint"></div>
        </div>

        <!-- Submit -->
        <button class="btn" id="forgot-btn" onclick="handleForgot()">
          <span class="btn-spinner" id="spinner"></span>
          <span id="btn-text">SEND OTP →</span>
        </button>

        <div class="divider"><span>or</span></div>

        <p class="footer-link"><a href="/">← Back to login</a></p>

        <div class="status-bar">
          <div class="status-item">
            <div class="status-dot-green"></div>
            <span class="status-label">AI ONLINE</span>
          </div>
          <div class="status-sep"></div>
          <div class="status-item">
            <div class="status-dot-purple"></div>
            <span class="status-label">ENCRYPTED</span>
          </div>
          <div class="status-sep"></div>
          <div class="status-item">
            <div class="status-dot-cyan"></div>
            <span class="status-label">SECURE</span>
          </div>
        </div>

      </div>
      <div class="card-bottom-line"></div>
    </div>

  </div>

  <script src="/static/js/script.js"></script>
</body>
</html>
