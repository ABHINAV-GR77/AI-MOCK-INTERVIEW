<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/static/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InterviewAI — Interview</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent:'#00e5ff', accent2:'#7b61ff', accent3:'#ff4d6d',
            success:'#00e676', warn:'#ffa726', surface:'#0d1117',
            bg:'#060a0f', border:'#1f2937', muted:'#6b7280',
          },
          fontFamily: { grotesk:['Space Grotesk','sans-serif'], mono:['DM Mono','monospace'] }
        }
      }
    }
  </script>
  <style>
    @keyframes shimmer  { 0%{background-position:200% center} 100%{background-position:-200% center} }
    @keyframes pulseDot { 0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.5)} 70%{box-shadow:0 0 0 6px rgba(0,230,118,0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .shimmer-brand { background:linear-gradient(90deg,#fff 0%,#00e5ff 30%,#7b61ff 60%,#fff 100%); background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:shimmer 4s linear infinite; }
    .pulse-dot { width:7px;height:7px;background:#00e676;border-radius:50%;animation:pulseDot 2s infinite; }
    .spin      { animation:spin 1s linear infinite; }
    .fade-up   { animation:fadeUp 0.4s ease forwards; }
    .sidebar { width:64px; transition:width 0.3s cubic-bezier(0.4,0,0.2,1); overflow:hidden; }
    .sidebar:hover { width:240px; box-shadow:4px 0 40px rgba(0,0,0,0.6); }
    .sidebar-inner { min-width:240px; }
    .nav-txt,.sb-label,.sb-brand-txt,.sb-status-txt { opacity:0; transition:opacity 0.15s; white-space:nowrap; }
    .sidebar:hover .nav-txt,.sidebar:hover .sb-label,.sidebar:hover .sb-brand-txt,.sidebar:hover .sb-status-txt { opacity:1; transition:opacity 0.2s ease 0.1s; }
    textarea { resize:none; }
    textarea:focus { outline:none; }
  </style>
</head>
<body class="bg-bg text-white font-mono min-h-screen" style="background-image:linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);background-size:48px 48px;">

  <!-- SIDEBAR -->
  <aside class="sidebar fixed left-0 top-0 bottom-0 bg-surface border-r border-border flex flex-col z-50">
    <div class="sidebar-inner flex flex-col h-full">
      <div class="flex items-center gap-3 px-4 py-5 border-b border-border flex-shrink-0">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style="background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2.2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <span class="shimmer-brand sb-brand-txt font-grotesk font-black text-base">InterviewAI</span>
      </div>
      <nav class="flex-1 p-3 overflow-y-auto overflow-x-hidden">
        <div class="sb-label text-xs tracking-widest uppercase px-2 mb-1 mt-1 font-bold" style="color:#4b5563">Main</div>
        <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 text-sm mb-0.5 no-underline transition-all">
          <svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span class="nav-txt">Dashboard</span>
        </a>
        <a href="/practice" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-accent bg-accent/10 text-sm mb-0.5 no-underline">
          <svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span class="nav-txt">Practice</span>
        </a>
        <a href="/interview/voice" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 text-sm mb-0.5 no-underline transition-all">
          <svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <span class="nav-txt">Voice Interview</span>
        </a>
        <a href="/analytics" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 text-sm mb-0.5 no-underline transition-all">
          <svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span class="nav-txt">Analytics</span>
        </a>
        </nav>
      <div class="px-3 py-2 flex-shrink-0">
        <div class="flex items-center gap-2 bg-success/10 border border-success/20 rounded-xl px-3 py-2">
          <div class="pulse-dot"></div>
          <span class="sb-status-txt text-success text-xs">AI Online</span>
        </div>
      </div>
      <div class="p-3 border-t border-border flex-shrink-0">
        
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="ml-16 min-h-screen flex flex-col">

    <!-- Loading screen -->
    <div id="loading-screen" class="flex-1 flex items-center justify-center fade-up">
      <div class="text-center">
        <div class="w-14 h-14 rounded-full border-2 border-accent border-t-transparent spin mx-auto mb-4"></div>
        <p class="font-grotesk font-bold text-white mb-1">Preparing your interview...</p>
        <p class="text-muted text-xs">AI is generating your first question</p>
      </div>
    </div>

    <!-- Interview screen -->
    <div id="interview-screen" class="hidden flex-1 flex flex-col p-6 gap-4 fade-up">

      <!-- Top bar -->
      <div class="flex items-center justify-between">
        <div>
          <h1 id="interview-title" class="font-grotesk font-black text-lg text-white capitalize"></h1>
          <p id="interview-meta" class="text-xs text-muted mt-0.5"></p>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-2 bg-surface border border-border rounded-lg px-3 py-1.5">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span id="timer-display" class="text-xs font-mono text-accent">10:00</span>
          </div>
          <span id="q-counter" class="text-xs text-muted bg-surface border border-border rounded-lg px-3 py-1.5">Q 1/5</span>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="h-1 bg-border rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full rounded-full transition-all duration-500" style="width:20%;background:linear-gradient(90deg,#00e5ff,#7b61ff)"></div>
      </div>

      <!-- Question card -->
      <div class="relative bg-surface border border-border rounded-2xl p-6 overflow-hidden" style="border-top:2px solid #00e5ff;">
        <div class="absolute inset-0 pointer-events-none" style="background:radial-gradient(ellipse at 10% 0%,rgba(0,229,255,0.05),transparent 60%)"></div>
        <div class="flex items-start justify-between gap-4">
          <div class="flex-1">
            <p class="text-xs text-muted tracking-widest uppercase mb-3">Question <span id="q-num">1</span></p>
            <p id="question-text" class="font-grotesk font-bold text-lg text-white leading-relaxed"></p>
          </div>
          <div id="last-score" class="hidden flex-shrink-0 text-right">
            <div id="last-score-val" class="font-grotesk font-black text-2xl"></div>
            <div class="text-xs text-muted">prev score</div>
          </div>
        </div>
        <div id="last-feedback" class="hidden mt-4 p-3 rounded-xl text-xs leading-relaxed"></div>
      </div>

      <!-- Answer area -->
      <div class="flex-1 bg-surface border border-border rounded-2xl p-5 flex flex-col">
        <p class="text-xs text-muted tracking-widest uppercase mb-3">Your Answer</p>
        <textarea
          id="answer-input"
          placeholder="Type your answer here... Be specific, use examples, structure your thoughts."
          class="flex-1 bg-transparent text-white text-sm leading-relaxed placeholder-muted border-none font-mono w-full"
          style="min-height:180px"
        ></textarea>
        <div class="flex items-center justify-between mt-4 pt-4 border-t border-border">
          <div id="word-count" class="text-xs text-muted">0 words</div>
          <div class="flex gap-3">
            <button onclick="skipQuestion()" class="px-4 py-2 rounded-xl text-xs text-muted border border-border hover:border-muted transition-all cursor-pointer bg-transparent">
              Skip
            </button>
            <button id="submit-btn" onclick="submitAnswer()"
              class="px-6 py-2 rounded-xl text-xs font-grotesk font-bold text-bg border-none cursor-pointer transition-all hover:-translate-y-0.5"
              style="background:linear-gradient(135deg,#00e5ff,#0099cc);">
              Submit Answer →
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- Submitting screen -->
    <div id="submitting-screen" class="hidden flex-1 flex items-center justify-center fade-up">
      <div class="text-center">
        <div class="w-14 h-14 rounded-full border-2 border-accent2 border-t-transparent spin mx-auto mb-4"></div>
        <p class="font-grotesk font-bold text-white mb-1">Scoring your interview...</p>
        <p class="text-muted text-xs">AI is evaluating all your answers</p>
      </div>
    </div>

  </main>

  <script src="/static/js/script.js"></script>
  <script src="/static/js/anticheat.js"></script>
  <script src="/static/js/interview.js"></script>
</body>
</html>
