<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/static/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InterviewAI — Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent:'#00e5ff', accent2:'#7b61ff', accent3:'#ff4d6d',
            success:'#00e676', warn:'#ffa726', surface:'#0d1117',
            bg:'#060a0f', border:'#1f2937', muted:'#6b7280',
          },
          fontFamily: { grotesk:['Space Grotesk','sans-serif'], mono:['DM Mono','monospace'] }
        }
      }
    }
  </script>
  <style>
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pop    { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
    @keyframes spin   { to{transform:rotate(360deg)} }
    .fade-up { animation:fadeUp 0.5s ease both; }
    .pop     { animation:pop 0.6s ease both; }
    .spin    { animation:spin 1s linear infinite; }
  </style>
</head>
<body class="bg-bg text-white font-mono min-h-screen" style="background-image:linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);background-size:48px 48px;">

  <!-- Loading -->
  <div id="loading-screen" class="min-h-screen flex items-center justify-center">
    <div class="text-center">
      <div class="w-14 h-14 rounded-full border-2 border-accent border-t-transparent spin mx-auto mb-4"></div>
      <p class="font-grotesk font-bold text-white mb-1">Loading results...</p>
    </div>
  </div>

  <!-- Results (hidden until data loads) -->
  <div id="results-content" class="hidden max-w-3xl mx-auto px-6 py-10">

    <!-- Hero -->
    <div class="text-center mb-8 fade-up">
      <div id="hero-emoji" class="text-6xl mb-4 pop">🎉</div>
      <h1 id="hero-title" class="font-grotesk font-black text-3xl text-white mb-2"></h1>
      <p id="hero-sub" class="text-muted text-sm"></p>
    </div>

    <!-- Score ring -->
    <div class="flex justify-center mb-8 fade-up" style="animation-delay:0.1s">
      <svg width="160" height="160" viewBox="0 0 160 160">
        <circle cx="80" cy="80" r="65" fill="none" stroke="#1f2937" stroke-width="12"/>
        <circle id="score-ring" cx="80" cy="80" r="65" fill="none" stroke="url(#scoreGrad)" stroke-width="12"
          stroke-linecap="round" stroke-dasharray="408.4" stroke-dashoffset="408.4"
          transform="rotate(-90 80 80)" style="transition:stroke-dashoffset 1.2s ease 0.3s"/>
        <defs>
          <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00e5ff"/>
            <stop offset="100%" stop-color="#7b61ff"/>
          </linearGradient>
        </defs>
        <text id="score-text" x="80" y="72" text-anchor="middle" dominant-baseline="middle"
          font-family="Space Grotesk,sans-serif" font-size="32" font-weight="800" fill="#f9fafb">—</text>
        <text x="80" y="95" text-anchor="middle"
          font-family="DM Mono,monospace" font-size="11" fill="#6b7280">SCORE</text>
      </svg>
    </div>

    <!-- Stats row -->
    <div id="stats-grid" class="grid gap-3 mb-6 fade-up" style="animation-delay:0.15s;grid-template-columns:repeat(4,1fr)">
      <div id="card-fillers" class="bg-surface border border-border rounded-2xl p-4 text-center" style="border-top:2px solid #ffa726">
        <div id="stat-fillers" class="font-grotesk font-black text-2xl text-warn mb-1">—</div>
        <div class="text-xs text-muted tracking-wider uppercase">Filler Words</div>
      </div>
      <div id="card-stutters" class="bg-surface border border-border rounded-2xl p-4 text-center" style="border-top:2px solid #ff4d6d">
        <div id="stat-stutters" class="font-grotesk font-black text-2xl text-accent3 mb-1">—</div>
        <div class="text-xs text-muted tracking-wider uppercase">Stutters</div>
      </div>
      <div class="bg-surface border border-border rounded-2xl p-4 text-center" style="border-top:2px solid #00e5ff">
        <div id="stat-answered" class="font-grotesk font-black text-2xl text-accent mb-1">—</div>
        <div class="text-xs text-muted tracking-wider uppercase">Answered</div>
      </div>
      <div class="bg-surface border border-border rounded-2xl p-4 text-center" style="border-top:2px solid #00e676">
        <div id="stat-duration" class="font-grotesk font-black text-2xl text-success mb-1">—</div>
        <div class="text-xs text-muted tracking-wider uppercase">Duration</div>
      </div>
    </div>

    <!-- Filler/Stutter breakdown (voice sessions only) -->
    <div id="filler-section" class="hidden mb-6 fade-up" style="animation-delay:0.2s">
      <div class="bg-surface border border-border rounded-2xl p-5">
        <div class="text-xs font-bold tracking-widest uppercase text-warn mb-4">⚠ Filler Words</div>
        <div id="filler-list"></div>
      </div>
      <div class="bg-surface border border-border rounded-2xl p-5">
        <div class="text-xs font-bold tracking-widest uppercase text-accent3 mb-4">🔴 Stutters & Repeats</div>
        <div id="stutter-list"></div>
        <div id="stutter-tip" class="hidden mt-4 p-3 rounded-xl text-xs leading-relaxed" style="background:rgba(255,77,109,0.06);border:1px solid rgba(255,77,109,0.15);color:#ff4d6d">
          <div class="font-bold mb-1">💡 Tip</div>
          Pause briefly instead of repeating words. A 1-second silence sounds more confident than "I I think...".
        </div>
      </div>
    </div>




    <!-- CTA buttons -->
    <div class="grid grid-cols-3 gap-3 fade-up" style="animation-delay:0.3s">
      <a href="/analytics" class="py-3 rounded-xl font-grotesk font-bold text-sm text-bg text-center no-underline transition-all hover:-translate-y-0.5" style="background:linear-gradient(135deg,#7b61ff,#00e5ff)">
        📊 Analytics & AI Coach
      </a>
      <a href="/practice" class="py-3 rounded-xl font-grotesk font-bold text-sm text-white text-center no-underline border border-border hover:border-white/30 transition-all">
        🔄 Practice Again
      </a>
      <a href="/dashboard" class="py-3 rounded-xl font-grotesk font-bold text-sm text-white text-center no-underline border border-border hover:border-white/30 transition-all">
        ← Dashboard
      </a>
    </div>

  </div>

  <script src="/static/js/script.js"></script>
  <script src="/static/js/results.js"></script>
</body>
</html>
