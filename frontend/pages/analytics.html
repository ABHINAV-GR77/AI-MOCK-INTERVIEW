<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/static/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InterviewAI — Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { accent:'#00e5ff',accent2:'#7b61ff',accent3:'#ff4d6d',success:'#00e676',warn:'#ffa726',surface:'#0d1117',bg:'#060a0f',border:'#1f2937',muted:'#6b7280' },
        fontFamily: { grotesk:['Space Grotesk','sans-serif'],mono:['DM Mono','monospace'] }
      }}
    }
  </script>
  <style>
    /* ── Sidebar animations ── */
    @keyframes shimmer  { 0%{background-position:200% center}100%{background-position:-200% center} }
    @keyframes pulseDot { 0%,100%{box-shadow:0 0 0 0 rgba(0,230,118,0.5)}70%{box-shadow:0 0 0 6px rgba(0,230,118,0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)} }
    @keyframes spin     { to{transform:rotate(360deg)} }
    @keyframes thinking-slide { 0%{transform:translateX(-100%)}100%{transform:translateX(400%)} }
    .shimmer-brand { background:linear-gradient(90deg,#fff 0%,#00e5ff 30%,#7b61ff 60%,#fff 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite; }
    .pulse-dot { width:7px;height:7px;background:#00e676;border-radius:50%;animation:pulseDot 2s infinite; }
    .fade-up   { animation:fadeUp 0.45s ease both; }
    .spinner   { animation:spin 0.8s linear infinite; }
    .sidebar { width:64px;transition:width 0.3s cubic-bezier(0.4,0,0.2,1);overflow:hidden; }
    .sidebar:hover { width:240px;box-shadow:4px 0 40px rgba(0,0,0,0.6); }
    .sidebar-inner { min-width:240px; }
    .nav-txt,.sb-label,.sb-brand-txt,.sb-status-txt { opacity:0;transition:opacity 0.15s;white-space:nowrap; }
    .sidebar:hover .nav-txt,.sidebar:hover .sb-label,.sidebar:hover .sb-brand-txt,.sidebar:hover .sb-status-txt { opacity:1;transition:opacity 0.2s ease 0.1s; }

    /* ── Page layout ── */
    :root {
      --bg:#060a0f; --surface:#0d1117; --border:#1f2937; --muted:#6b7280;
      --accent:#00e5ff; --accent2:#7b61ff; --accent3:#ff4d6d;
      --success:#00e676; --warn:#ffa726; --text:#f9fafb;
    }
    body { background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; }
    .main { margin-left:64px; padding:32px; min-height:100vh;
      background-image:linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);
      background-size:48px 48px; }

    /* ── Header ── */
    .page-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:24px; }
    .page-title-block h1 { font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:800;margin:0 0 4px; }
    .page-title-block p { color:var(--muted);font-size:12px;margin:0; }
    .filter-btn { padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;transition:all 0.2s; }
    .filter-btn.active { background:var(--accent);border-color:var(--accent);color:#060a0f; }
    .ai-coach-btn { padding:8px 18px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:20px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.2s; }
    .ai-coach-btn:hover { opacity:0.85; }
    .ai-coach-btn:disabled { opacity:0.4;cursor:not-allowed; }

    /* ── Tabs ── */
    .tab-bar { display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;width:fit-content; }
    .tab-btn { padding:8px 18px;border-radius:8px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all 0.2s; }
    .tab-btn.active { background:var(--accent2);color:#fff; }

    /* ── Stat cards ── */
    .stat-row { display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px; }
    .a-stat { background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;cursor:default; }
    .a-stat:hover { transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,0.3); }
    .a-stat::before { content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,0.015) 2px,rgba(255,255,255,0.015) 4px);pointer-events:none;z-index:0; }
    .a-stat.c1 { border-top:2px solid #00e5ff;box-shadow:0 0 0 0 rgba(0,229,255,0); }
    .a-stat.c1:hover { box-shadow:0 8px 32px rgba(0,229,255,0.12); }
    .a-stat.c2 { border-top:2px solid #7b61ff;box-shadow:0 0 0 0 rgba(123,97,255,0); }
    .a-stat.c2:hover { box-shadow:0 8px 32px rgba(123,97,255,0.12); }
    .a-stat.c3 { border-top:2px solid #ffa726;box-shadow:0 0 0 0 rgba(255,167,38,0); }
    .a-stat.c3:hover { box-shadow:0 8px 32px rgba(255,167,38,0.12); }
    .a-stat.c4 { border-top:2px solid #00e676;box-shadow:0 0 0 0 rgba(0,230,118,0); }
    .a-stat.c4:hover { box-shadow:0 8px 32px rgba(0,230,118,0.12); }
    .a-stat-icon { width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:18px;position:relative;z-index:1; }
    .a-stat.c1 .a-stat-icon { background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.2); }
    .a-stat.c2 .a-stat-icon { background:rgba(123,97,255,0.1);border:1px solid rgba(123,97,255,0.2); }
    .a-stat.c3 .a-stat-icon { background:rgba(255,167,38,0.1);border:1px solid rgba(255,167,38,0.2); }
    .a-stat.c4 .a-stat-icon { background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.2); }
    .a-stat-val { font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:800;line-height:1;margin-bottom:6px;position:relative;z-index:1; }
    .a-stat-lbl { font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;position:relative;z-index:1; }
    .a-stat-sub { font-size:11px;margin-top:8px;font-family:'DM Mono',monospace;position:relative;z-index:1; }

    /* ── Grid + cards ── */
    .ag { display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px; }
    .ac { background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px; }
    .ac-title { font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;margin-bottom:4px; }
    .ac-sub { font-size:11px;color:var(--muted);margin-bottom:18px; }

    /* ── Filler bars ── */
    .filler-bars { display:flex;flex-direction:column;gap:10px; }
    .filler-row { display:flex;align-items:center;gap:10px; }
    .filler-word { font-family:'DM Mono',monospace;font-size:12px;color:var(--text);width:90px;flex-shrink:0; }
    .filler-bar-wrap { flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden; }
    .filler-bar-fill { height:100%;border-radius:4px;transition:width 1.2s cubic-bezier(0.4,0,0.2,1); }
    .filler-count { font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:32px;text-align:right; }

    /* ── AI Coach UI ── */
    .coach-loading { text-align:center;padding:60px 20px; }
    .coach-loading .spinner-ring { width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px; }
    .weakness-banner { border-radius:12px;padding:16px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:14px; }
    .weakness-banner.high   { background:rgba(255,77,109,0.07);border:1px solid rgba(255,77,109,0.2); }
    .weakness-banner.medium { background:rgba(255,167,38,0.07);border:1px solid rgba(255,167,38,0.2); }
    .weakness-banner.low    { background:rgba(0,229,255,0.05);border:1px solid rgba(0,229,255,0.12); }
    .wb-tag { font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px; }
    .wb-tag.high{color:var(--accent3);}.wb-tag.medium{color:#ffa726;}.wb-tag.low{color:var(--accent);}
    .wb-title { font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px; }
    .wb-desc { font-size:12px;color:var(--muted);line-height:1.6; }
    .weakness-list { display:flex;flex-direction:column;gap:10px;margin-top:12px; }
    .weakness-item { background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;border-left:3px solid var(--border); }
    .weakness-item.high{border-left-color:var(--accent3);}.weakness-item.medium{border-left-color:#ffa726;}.weakness-item.low{border-left-color:var(--accent);}
    .wi-header { display:flex;justify-content:space-between;align-items:center;margin-bottom:6px; }
    .wi-cat { font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase; }
    .wi-sev { font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px; }
    .wi-sev.high{background:rgba(255,77,109,0.1);color:var(--accent3);}.wi-sev.medium{background:rgba(255,167,38,0.1);color:#ffa726;}.wi-sev.low{background:rgba(0,229,255,0.08);color:var(--accent);}
    .wi-issue { font-size:13px;font-weight:600;margin-bottom:5px; }
    .wi-evidence { font-size:11px;color:var(--accent2);font-style:italic;margin-bottom:5px;padding:4px 8px;background:rgba(123,97,255,0.06);border-radius:6px; }
    .wi-impact { font-size:11px;color:var(--muted);line-height:1.5; }
    .strength-chips { display:flex;flex-wrap:wrap;gap:8px; }
    .strength-chip { padding:6px 14px;background:rgba(0,230,118,0.08);border:1px solid rgba(0,230,118,0.2);border-radius:20px;font-size:12px;color:var(--success); }
    .plan-list { display:flex;flex-direction:column;gap:12px;margin-top:16px; }
    .plan-item { background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:16px 16px 16px 20px;position:relative;overflow:hidden; }
    .plan-item::before { content:'';position:absolute;top:0;left:0;bottom:0;width:4px; }
    .plan-item.p1::before{background:var(--accent3);}.plan-item.p2::before{background:#ffa726;}.plan-item.p3::before{background:var(--accent);}.plan-item.p4::before,.plan-item.p5::before{background:var(--accent2);}
    .plan-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:8px; }
    .plan-title { font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700; }
    .plan-priority { font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted); }
    .plan-desc { font-size:12px;color:var(--text);line-height:1.6;margin-bottom:8px; }
    .plan-exercise { font-size:11px;color:var(--accent);padding:8px 10px;background:rgba(0,229,255,0.05);border-radius:6px;margin-bottom:6px;line-height:1.5; }
    .plan-timeline { font-size:10px;color:var(--muted); }
    .quick-wins { display:flex;flex-direction:column;gap:8px; }
    .qw-item { display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:rgba(0,229,255,0.04);border:1px solid rgba(0,229,255,0.1);border-radius:8px;font-size:12px;line-height:1.5; }
    .qw-num { font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:800;color:var(--accent);flex-shrink:0; }

    /* ── Breakdown ── */
    .hi-filler { background:rgba(255,167,38,0.25);color:#ffa726;border-radius:3px;padding:0 2px;font-weight:700; }
    .hi-stutter { background:rgba(255,77,109,0.2);color:var(--accent3);border-radius:3px;padding:0 2px;font-weight:700;border-bottom:2px solid var(--accent3); }
    .answer-cards { display:flex;flex-direction:column;gap:10px; }
    .answer-card { background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color 0.2s; }
    .answer-card:hover { border-color:var(--accent); }
    .answer-card.open { border-color:var(--accent2); }
    .ac-row { display:flex;align-items:center;gap:12px; }
    .ac-qnum { font-size:11px;color:var(--muted);flex-shrink:0; }
    .ac-qtxt { font-size:12px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .ac-badges { display:flex;gap:6px;flex-shrink:0; }
    .badge-sm { padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;font-family:'DM Mono',monospace; }
    .badge-good{background:rgba(0,230,118,0.1);color:var(--success);}.badge-warn{background:rgba(255,167,38,0.1);color:#ffa726;}.badge-bad{background:rgba(255,77,109,0.1);color:var(--accent3);}.badge-neu{background:rgba(255,255,255,0.05);color:var(--muted);}
    .ac-detail { display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border); }
    .answer-card.open .ac-detail { display:block; }
    .ac-metrics { display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px; }
    .ac-metric { text-align:center; }
    .ac-metric-val { font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:800; }
    .ac-metric-lbl { font-size:10px;color:var(--muted); }
    .ac-transcript { font-size:11px;color:var(--muted);font-style:italic;line-height:1.7;padding:10px 12px;background:rgba(255,255,255,0.02);border-radius:6px; }

    /* ── Charts ── */
    .chart-canvas { width:100%;height:160px; }
    .donut-wrap { display:flex;align-items:center;gap:20px;margin-top:12px; }
    .donut-legend { display:flex;flex-direction:column;gap:8px; }
    .legend-row { display:flex;align-items:center;gap:8px;font-size:12px; }
    .legend-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
    .legend-val { color:var(--text);font-weight:600;margin-left:auto;font-family:'DM Mono',monospace;font-size:11px; }
    .radar-wrap { display:flex;justify-content:center; }

    /* ── Loading/empty ── */
    .empty-state { text-align:center;padding:80px 20px;color:var(--muted); }
    .empty-state-icon { font-size:56px;margin-bottom:16px; }
    .empty-state-title { font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text); }
    .empty-state-sub { font-size:13px;line-height:1.7;max-width:400px;margin:0 auto; }
    .thinking-bar { height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin:12px auto;max-width:200px; }
    .thinking-fill { height:100%;width:30%;background:linear-gradient(90deg,transparent,var(--accent2),transparent);animation:thinking-slide 1.2s ease-in-out infinite; }
    aside a, aside .nav-txt { font-family:'Space Grotesk',sans-serif !important; font-weight:500; }
  </style>
</head>
<body>

  <!-- SIDEBAR (Tailwind collapsible) -->
  <aside class="sidebar fixed left-0 top-0 bottom-0 bg-surface border-r border-border flex flex-col z-50" style="font-family:'Space Grotesk',sans-serif">
    <div class="sidebar-inner flex flex-col h-full">
      <div class="flex items-center gap-3 px-4 py-5 border-b border-border flex-shrink-0">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style="background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2.2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>

      <nav class="flex-1 p-3 overflow-y-auto overflow-x-hidden">

          <svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>

          <svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span class="nav-txt">Practice</span>

          <svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <span class="nav-txt">Voice Interview</span>
        </a>
        <a href="/analytics" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-accent bg-accent/10 font-grotesk text-sm mb-0.5 no-underline">
          <svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          <span class="nav-txt">Analytics</span>
        </a>
        <a href="/study-guide" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 font-grotesk text-sm mb-0.5 no-underline transition-all">
          <svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2 L13.5 8.5 L20 10 L13.5 11.5 L12 18 L10.5 11.5 L4 10 L10.5 8.5 Z" fill="currentColor" opacity="0.9"/><path d="M19 2 L19.8 4.2 L22 5 L19.8 5.8 L19 8 L18.2 5.8 L16 5 L18.2 4.2 Z" fill="currentColor" opacity="0.7"/><path d="M5 16 L5.6 17.4 L7 18 L5.6 18.6 L5 20 L4.4 18.6 L3 18 L4.4 17.4 Z" fill="currentColor" opacity="0.5"/></svg>

        <a href="/tips" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-muted hover:text-white hover:bg-white/5 font-grotesk text-sm mb-0.5 no-underline transition-all">
          <svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

          <svg class="flex-shrink-0" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8m-4-4v4M5 3H3v5a4 4 0 0 0 4 4h0m12-9h2v5a4 4 0 0 1-4 4h0M7 3h10l-1 9H8L7 3z"/></svg>
          <span class="nav-txt">Leaderboard</span>

        </nav>
      <div class="px-3 py-2 flex-shrink-0">
        <div class="flex items-center gap-2 bg-success/10 border border-success/20 rounded-xl px-3 py-2">
          <div class="pulse-dot"></div>
          <span class="sb-status-txt text-success text-xs">AI Online</span>
        </div>
      </div>
      <div class="p-3 border-t border-border flex-shrink-0">
        
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div class="page-title-block">
        <h1>Interview Analytics</h1>
        <p>Track your performance, scores, and improvement across all sessions</p>
