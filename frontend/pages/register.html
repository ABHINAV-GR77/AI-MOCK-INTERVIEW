<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/static/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>InterviewAI — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    body { align-items: flex-start; padding: 20px 0; }
    .brand { margin-bottom: 16px; }
    .brand-name-light, .brand-name-bold { font-size: 28px; }
    .brand-icon { width: 38px; height: 38px; }
    .brand-tagline { font-size: 9px; }
    .card-body { padding: 28px 32px; }
    .field { margin-bottom: 14px; }
    .card-title { font-size: 20px; }
    .card-sub { margin-bottom: 16px; }
    .strength-bars { margin-top: 5px; }
    .divider { margin: 14px 0; }
    .status-bar { margin-top: 14px; padding-top: 14px; }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7b61ff" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <div class="brand-dot"></div>
        </div>
        <span class="brand-name-light">Interview</span><span class="brand-name-bold">AI</span>
      </div>
      <p class="brand-tagline">AI · MOCK · INTERVIEWS</p>
    </div>

    <!-- Card -->
    <div class="card card-purple">
      <div class="card-scan"></div>
      <div class="card-top-line"></div>

      <div class="card-body">

        <div class="card-divider">
          <div class="card-divider-line"></div>
          <span class="card-divider-text">CREATE ACCOUNT</span>
          <div class="card-divider-line-r"></div>
        </div>
        <h2 class="card-title">Get started free</h2>
        <p class="card-sub">Join thousands preparing smarter with AI</p>

        <div class="error-box" id="error-msg"></div>
        <div class="success-box" id="success-msg">✓ Account created! Redirecting to login...</div>

        <!-- Name -->
        <div class="field">
          <label class="field-label">
            <span class="field-label-icon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#7b61ff" stroke-width="2">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
              FULL NAME
            </span>
          </label>
          <input class="field-input field-input-purple" id="name" type="text" placeholder="Your name" autocomplete="name"/>
        </div>

        <!-- Email -->
        <div class="field">
          <label class="field-label">
            <span class="field-label-icon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#7b61ff" stroke-width="2">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
              EMAIL ADDRESS
            </span>
          </label>
          <input class="field-input field-input-purple" id="email" type="email" placeholder="you@example.com"
            oninput="validateEmail(this,'email-hint')" autocomplete="email"/>
          <div class="email-hint" id="email-hint"></div>
        </div>

        <!-- Password -->
        <div class="field">
          <label class="field-label">
            <span class="field-label-icon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#7b61ff" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              PASSWORD
            </span>
          </label>
          <div class="pw-wrap">
            <input class="field-input field-input-purple" id="password" type="password" placeholder="Min 8 characters"
              oninput="updateStrength(this.value,'s1','s2','s3','s4','slabel')" autocomplete="new-password"/>
            <button class="eye-btn" onclick="toggleEye('password','eye-icon','#7b61ff')">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-bars">
            <div class="sbar" id="s1"></div>
            <div class="sbar" id="s2"></div>
            <div class="sbar" id="s3"></div>
            <div class="sbar" id="s4"></div>
          </div>
          <div class="strength-hint">
            <span>Strength</span>
            <span id="slabel"></span>
          </div>
        </div>

        <!-- Submit -->
        <button class="btn btn-purple" id="reg-btn" onclick="handleRegister()">
          <span class="btn-spinner" id="spinner"></span>
          <span id="btn-text">CREATE ACCOUNT</span>
        </button>

        <div class="divider"><span>or</span></div>

        <p class="footer-link">Already have an account? <a href="/">Sign in →</a></p>

        <div class="status-bar">
          <div class="status-item">
            <div class="status-dot-green"></div>
            <span class="status-label">AI ONLINE</span>
          </div>
          <div class="status-sep"></div>
          <div class="status-item">
            <div class="status-dot-purple"></div>
            <span class="status-label">ENCRYPTED</span>
          </div>
          <div class="status-sep"></div>
          <div class="status-item">
            <div class="status-dot-cyan"></div>
            <span class="status-label">SECURE</span>
          </div>
        </div>

      </div>
      <div class="card-bottom-line"></div>
    </div>

  </div>

  <script src="/static/js/script.js"></script>
</body>
</html>
