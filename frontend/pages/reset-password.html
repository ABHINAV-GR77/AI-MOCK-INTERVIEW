<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/png" href="/static/favicon.png"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>InterviewAI — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    body { align-items: flex-start; padding: 20px 0; }
    .brand { margin-bottom: 16px; }
    .brand-name-light, .brand-name-bold { font-size: 28px; }
    .brand-icon { width: 38px; height: 38px; }
    .brand-tagline { font-size: 9px; }
    .card-body { padding: 28px 32px; }
    .field { margin-bottom: 14px; }
    .card-title { font-size: 20px; }
    .card-sub { margin-bottom: 16px; }
    .otp-input { width: 46px; height: 54px; font-size: 20px; }
    .otp-row { gap: 8px; }
    .strength-bars { margin-top: 5px; }
    .divider { margin: 14px 0; }
    .status-bar { margin-top: 14px; padding-top: 14px; }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="auth-wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
          <div class="brand-dot"></div>
        </div>
        <span class="brand-name-light">Interview</span><span class="brand-name-bold">AI</span>
      </div>
      <p class="brand-tagline">AI · MOCK · INTERVIEWS</p>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-scan"></div>
      <div class="card-top-line"></div>

      <div class="card-body">

        <div class="card-divider">
          <div class="card-divider-line"></div>
          <span class="card-divider-text">RESET PASSWORD</span>
          <div class="card-divider-line-r"></div>
        </div>
        <h2 class="card-title">Set new password</h2>
        <p class="card-sub">Enter the OTP sent to your email</p>

        <input type="hidden" id="email"/>

        <div class="error-box" id="error-msg"></div>
        <div class="success-box" id="success-msg">✓ Password reset! Redirecting to login...</div>

        <!-- OTP -->
        <div class="field">
          <label class="field-label">
            <span class="field-label-icon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              6-DIGIT OTP
            </span>
            <span>Expires in <span id="timer" style="color:#00e5ff;">10:00</span></span>
          </label>
          <div class="otp-row" id="otp-row">
            <input class="otp-input" type="text" maxlength="1" inputmode="numeric"/>
            <input class="otp-input" type="text" maxlength="1" inputmode="numeric"/>
            <input class="otp-input" type="text" maxlength="1" inputmode="numeric"/>
            <input class="otp-input" type="text" maxlength="1" inputmode="numeric"/>
            <input class="otp-input" type="text" maxlength="1" inputmode="numeric"/>
            <input class="otp-input" type="text" maxlength="1" inputmode="numeric"/>
          </div>
        </div>

        <!-- New Password -->
        <div class="field">
          <label class="field-label">
            <span class="field-label-icon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              NEW PASSWORD
            </span>
          </label>
          <div class="pw-wrap">
            <input class="field-input" id="password" type="password" placeholder="Min 8 characters"
              oninput="updateStrength(this.value,'s1','s2','s3','s4','slabel')" autocomplete="new-password"/>
            <button class="eye-btn" onclick="toggleEye('password','eye-icon')">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-bars">
            <div class="sbar" id="s1"></div>
            <div class="sbar" id="s2"></div>
            <div class="sbar" id="s3"></div>
            <div class="sbar" id="s4"></div>
          </div>
          <div class="strength-hint">
            <span>Strength</span>
            <span id="slabel"></span>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="field">
          <label class="field-label">
            <span class="field-label-icon">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="2">
                <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>
              </svg>
              CONFIRM PASSWORD
            </span>
          </label>
          <input class="field-input" id="confirm-password" type="password" placeholder="Re-enter password" autocomplete="new-password"/>
        </div>

        <!-- Submit -->
        <button class="btn" id="reset-btn" onclick="handleReset()">
          <span class="btn-spinner" id="spinner"></span>
          <span id="btn-text">RESET PASSWORD →</span>
        </button>

        <div class="divider"><span>or</span></div>

        <p class="footer-link"><a href="/forgot-password">← Resend OTP</a></p>

        <div class="status-bar">
          <div class="status-item">
            <div class="status-dot-green"></div>
            <span class="status-label">AI ONLINE</span>
          </div>
          <div class="status-sep"></div>
          <div class="status-item">
            <div class="status-dot-purple"></div>
            <span class="status-label">ENCRYPTED</span>
          </div>
          <div class="status-sep"></div>
          <div class="status-item">
            <div class="status-dot-cyan"></div>
            <span class="status-label">SECURE</span>
          </div>
        </div>

      </div>
      <div class="card-bottom-line"></div>
    </div>

  </div>

  <script src="/static/js/script.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('email').value = params.get('email') || '';
    const otpInputs = document.querySelectorAll('.otp-input');
    otpInputs.forEach((inp, i) => {
      inp.addEventListener('input',   () => otpMove(inp, i, otpInputs));
      inp.addEventListener('keydown', e  => otpBack(e,   i, otpInputs));
    });
    startTimer('timer', 600);
  </script>
</body>
</html>
